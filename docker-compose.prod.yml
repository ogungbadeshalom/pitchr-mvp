services:
  postgres:
    image: postgres:15
    container_name: pitchr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pitchr
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pitchr
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pitchr -d pitchr"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  supertokens:
    image: registry.supertokens.io/supertokens/supertokens-postgresql:latest
    container_name: pitchr-supertokens
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRESQL_CONNECTION_URI: postgresql://pitchr:password@postgres:5432/pitchr

volumes:
  pgdata:
    driver: local
