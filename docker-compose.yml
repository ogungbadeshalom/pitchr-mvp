services:
  # ── Database ─────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: pitchr-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pitchr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-pitchr}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pitchr} -d ${POSTGRES_DB:-pitchr}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Auth (SuperTokens) ──────────────────────────────
  supertokens:
    image: registry.supertokens.io/supertokens/supertokens-postgresql:latest
    container_name: pitchr-supertokens
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRESQL_CONNECTION_URI: postgresql://${POSTGRES_USER:-pitchr}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-pitchr}

  # ── Backend API ─────────────────────────────────────
  backend:
    build: ./backend
    container_name: pitchr-backend
    restart: unless-stopped
    ports:
      - "5001:5001"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      supertokens:
        condition: service_started
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-pitchr}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-pitchr}
      SUPERTOKENS_URI: http://supertokens:3567
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      API_URL: ${API_URL:-http://localhost:5001}

  # ── Frontend (Next.js) ──────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ""
    container_name: pitchr-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - backend

volumes:
  pgdata:
