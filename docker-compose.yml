services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: proposalpro
      POSTGRES_PASSWORD: proposalpro
      POSTGRES_DB: proposalpro
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proposalpro"]
      interval: 10s
      timeout: 5s
      retries: 5

  supertokens:
    image: registry.supertokens.io/supertokens/supertokens-postgresql:7.0
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRESQL_CONNECTION_URI: postgresql://proposalpro:proposalpro@postgres:5432/proposalpro
    ports:
      - "3567:3567"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3567/hello"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
