services:
  postgres:
    image: postgres:15
    container_name: pitchr-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pitchr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-pitchr}
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pitchr} -d ${POSTGRES_DB:-pitchr}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  supertokens:
    image: registry.supertokens.io/supertokens/supertokens-postgresql:7.0
    container_name: pitchr-supertokens
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRESQL_CONNECTION_URI: postgresql://${POSTGRES_USER:-pitchr}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pitchr}
      API_KEYS: ${SUPERTOKENS_API_KEY}
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    build: ./backend
    container_name: pitchr-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:5001:5001"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      supertokens:
        condition: service_started
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-pitchr}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pitchr}
      SUPERTOKENS_URI: http://supertokens:3567
      FRONTEND_URL: ${FRONTEND_URL}
      API_URL: ${API_URL}
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ""
    container_name: pitchr-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file: .env
    depends_on:
      backend:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M

  caddy:
    image: caddy:2-alpine
    container_name: pitchr-caddy
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  pgdata:
  caddy_data:
  caddy_config:
