services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: pitchr
      POSTGRES_PASSWORD: pitchr
      POSTGRES_DB: pitchr
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pitchr"]
      interval: 10s
      timeout: 5s
      retries: 5

  supertokens:
    image: registry.supertokens.io/supertokens/supertokens-postgresql:7.0
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRESQL_CONNECTION_URI: postgresql://pitchr:pitchr@postgres:5432/pitchr
    ports:
      - "3567:3567"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3567/hello"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
